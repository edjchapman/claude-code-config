name: Validate Config

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-json:
    name: Validate JSON files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate settings.json
        run: python -m json.tool settings.json > /dev/null

      - name: Validate all settings templates
        run: |
          for f in settings-templates/*.json; do
            echo "Validating $f..."
            python -m json.tool "$f" > /dev/null
          done

      - name: Validate merge output for each template
        run: |
          for f in settings-templates/*.json; do
            name=$(basename "$f" .json)
            if [ "$name" != "base" ]; then
              echo "Testing merge: base + $name"
              python scripts/merge-settings.py settings-templates base "$name" > /dev/null
            fi
          done

      - name: Validate keybindings.json
        run: |
          if [ -f keybindings.json ]; then
            echo "Validating keybindings.json..."
            python -m json.tool keybindings.json > /dev/null
          fi

      - name: Validate all MCP templates
        run: |
          for f in mcp-templates/*.json; do
            echo "Validating $f..."
            python -m json.tool "$f" > /dev/null
          done

      - name: Validate MCP merge output for each template
        run: |
          for f in mcp-templates/*.json; do
            name=$(basename "$f" .json)
            if [ "$name" != "base" ]; then
              echo "Testing MCP merge: base + $name"
              python scripts/merge-mcp.py mcp-templates base "$name" > /dev/null
            fi
          done

  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run shellcheck on setup scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts
          severity: warning

  check-duplicates:
    name: Check for duplicate agent/command/skill names
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run check-duplicates.sh
        run: bash scripts/hooks/check-duplicates.sh

  check-docs-drift:
    name: Check docs reference all primitives on disk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run check-docs-drift.sh
        run: bash scripts/check-docs-drift.sh

  markdownlint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"
          config: ".markdownlint.json"

  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        # Use the official download script to fetch a pinned actionlint
        # binary — avoids the Go-build path that breaks in some
        # environments (see .pre-commit-config.yaml comment).
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color
