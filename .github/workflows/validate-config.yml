name: Validate Config

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-json:
    name: Validate JSON files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate settings.json
        run: python -m json.tool settings.json > /dev/null

      - name: Validate hooks/hooks.json (plugin-mode hooks file)
        run: python -m json.tool hooks/hooks.json > /dev/null

      - name: Validate settings.personal.json.example
        run: python -m json.tool settings.personal.json.example > /dev/null

      - name: Validate all settings templates
        run: |
          for f in settings-templates/*.json; do
            echo "Validating $f..."
            python -m json.tool "$f" > /dev/null
          done

      - name: Validate merge output for each template
        run: |
          for f in settings-templates/*.json; do
            name=$(basename "$f" .json)
            if [ "$name" != "base" ]; then
              echo "Testing merge: base + $name"
              python scripts/merge-settings.py settings-templates base "$name" > /dev/null
            fi
          done

      - name: Validate keybindings.json
        run: |
          if [ -f keybindings.json ]; then
            echo "Validating keybindings.json..."
            python -m json.tool keybindings.json > /dev/null
          fi

      - name: Validate all MCP templates
        run: |
          for f in mcp-templates/*.json; do
            echo "Validating $f..."
            python -m json.tool "$f" > /dev/null
          done

      - name: Validate MCP merge output for each template
        run: |
          for f in mcp-templates/*.json; do
            name=$(basename "$f" .json)
            if [ "$name" != "base" ]; then
              echo "Testing MCP merge: base + $name"
              python scripts/merge-mcp.py mcp-templates base "$name" > /dev/null
            fi
          done

  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run shellcheck on setup scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts
          severity: warning

      - name: Run shellcheck on the vendored tooling payload
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: tooling
          severity: warning

  check-duplicates:
    name: Check for duplicate agent/command/skill names
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run check-duplicates.sh
        run: bash scripts/hooks/check-duplicates.sh

  validate-hooks:
    name: Validate hook files (sync + script integrity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Hook configs in settings.json and hooks/hooks.json must match
        # Plugin distribution reads hooks/hooks.json; symlink-global mode reads
        # settings.json. Both must carry the same hook definitions or hooks
        # will silently differ between install paths.
        run: |
          diff <(python3 -c "import json; print(json.dumps(json.load(open('settings.json'))['hooks'], indent=2, sort_keys=True))") \
               <(python3 -c "import json; print(json.dumps(json.load(open('hooks/hooks.json'))['hooks'], indent=2, sort_keys=True))")

      - name: Every hook command must reference an existing executable script with a shebang
        # Catches typos in hook paths and hook scripts that were renamed without
        # the settings.json reference being updated.
        run: |
          python3 <<'PY'
          import json
          import os
          import sys

          errors = []
          for source in ('settings.json', 'hooks/hooks.json'):
              with open(source) as f:
                  data = json.load(f)
              hooks = data.get('hooks', {})
              for event, entries in hooks.items():
                  for entry in entries:
                      for hook in entry.get('hooks', []):
                          if hook.get('type') != 'command':
                              continue
                          cmd = hook.get('command', '')
                          # Hook commands use ${CLAUDE_PLUGIN_DIR:-...readlink...}
                          # followed by a path under scripts/hooks/. Extract the
                          # script-relative path so we can check it on disk.
                          if 'scripts/hooks/' not in cmd:
                              errors.append(f'{source} {event}: command does not reference scripts/hooks/: {cmd}')
                              continue
                          script_rel = 'scripts/hooks/' + cmd.split('scripts/hooks/', 1)[1].split()[0]
                          if not os.path.isfile(script_rel):
                              errors.append(f'{source} {event}: referenced script does not exist: {script_rel}')
                              continue
                          if not os.access(script_rel, os.X_OK):
                              errors.append(f'{source} {event}: referenced script is not executable: {script_rel}')
                          with open(script_rel, 'rb') as sf:
                              first_line = sf.readline()
                          if not first_line.startswith(b'#!'):
                              errors.append(f'{source} {event}: referenced script lacks a shebang: {script_rel}')

          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          print('All hook script references are valid.')
          PY

  check-docs-drift:
    name: Check docs reference all primitives on disk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run check-docs-drift.sh
        run: bash scripts/check-docs-drift.sh

  markdownlint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          # Explicit `globs` bypasses `.markdownlintignore` discovery, so
          # exclusions have to be negated here. CHANGELOG.md is auto-generated
          # by release-please and uses a format that doesn't satisfy MD012.
          globs: |
            **/*.md
            !CHANGELOG.md
          config: ".markdownlint.json"

  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run actionlint
        # Use the official download script to fetch a pinned actionlint
        # binary — avoids the Go-build path that breaks in some
        # environments (see .pre-commit-config.yaml comment).
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color
